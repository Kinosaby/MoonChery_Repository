<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoonCherry — VHS Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Syncopate:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --neon-pink:#ff2d78;--neon-cyan:#00f5ff;--neon-yellow:#ffe600;
  --neon-purple:#bf00ff;--dark:#050008;--crt:#0a000f;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'VT323',monospace;cursor:none;}

/* CRT screen wrapper */
#crt{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0d001a 60%,#000 100%);
}
/* Scanlines */
#crt::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px);
  pointer-events:none;z-index:100;
}
/* CRT vignette */
#crt::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);
  pointer-events:none;z-index:101;
}

#screen{
  width:min(90vw,860px);height:min(85vh,540px);
  border:3px solid #333;border-radius:8px;
  background:#04000a;
  position:relative;overflow:hidden;
  box-shadow:0 0 60px rgba(255,45,120,0.25),0 0 120px rgba(0,245,255,0.1),inset 0 0 80px rgba(0,0,0,0.6);
}

canvas#bg{position:absolute;inset:0;width:100%;height:100%;}

/* VHS timestamp */
#timestamp{
  position:absolute;top:18px;left:22px;
  font-family:'VT323',monospace;font-size:1.1rem;
  color:var(--neon-cyan);opacity:0.85;
  letter-spacing:0.08em;
  text-shadow:0 0 8px var(--neon-cyan);
  z-index:20;
}
#rec{
  position:absolute;top:18px;right:22px;
  font-family:'VT323',monospace;font-size:1.1rem;
  color:var(--neon-pink);
  letter-spacing:0.12em;
  text-shadow:0 0 10px var(--neon-pink);
  z-index:20;
  animation:recBlink 1.1s step-end infinite;
}
@keyframes recBlink{0%,100%{opacity:1;}50%{opacity:0;}}

/* Main content */
#content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;gap:0;
}

#play-screen{
  display:flex;flex-direction:column;align-items:center;gap:2rem;
  transition:opacity 0.5s;
}
#cassette-svg{filter:drop-shadow(0 0 12px rgba(255,45,120,0.5));}

#play-btn{
  font-family:'Syncopate',sans-serif;font-size:0.7rem;
  letter-spacing:0.3em;color:var(--dark);
  background:var(--neon-pink);border:none;padding:0.75rem 2.5rem;
  cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 20px var(--neon-pink),0 0 40px rgba(255,45,120,0.4);
  transition:all 0.2s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
#play-btn:hover{background:#fff;box-shadow:0 0 30px #fff,0 0 60px var(--neon-pink);}
#play-btn:active{transform:scale(0.96);}

#main-screen{opacity:0;pointer-events:none;transition:opacity 0.8s;position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}

/* Glitch name */
#glitch-name{
  font-family:'Syncopate',sans-serif;
  font-size:clamp(1.8rem,6vw,3.5rem);
  font-weight:700;color:#fff;
  text-transform:uppercase;letter-spacing:0.06em;
  position:relative;margin-bottom:0.3rem;
}
#glitch-name::before,#glitch-name::after{
  content:attr(data-text);position:absolute;inset:0;
}
#glitch-name::before{color:var(--neon-cyan);animation:glitch1 2.5s infinite;clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%);}
#glitch-name::after{color:var(--neon-pink);animation:glitch2 2.5s infinite;clip-path:polygon(0 65%,100% 65%,100% 80%,0 80%);}
@keyframes glitch1{0%,90%,100%{transform:translate(0);}92%{transform:translate(-4px,1px);}94%{transform:translate(4px,-1px);}96%{transform:translate(-2px,2px);}}
@keyframes glitch2{0%,88%,100%{transform:translate(0);}90%{transform:translate(4px,-2px);}92%{transform:translate(-3px,1px);}94%{transform:translate(2px,-1px);}}

#sub-text{
  font-family:'Space Mono',monospace;font-size:clamp(0.55rem,1.5vw,0.75rem);
  color:var(--neon-yellow);letter-spacing:0.25em;text-transform:uppercase;
  text-shadow:0 0 10px var(--neon-yellow);margin-bottom:2rem;
}

#nicks-row{display:flex;gap:1.2rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center;}
.nick-tag{
  font-family:'VT323',monospace;font-size:1.1rem;letter-spacing:0.12em;
  padding:0.25rem 0.8rem;border:1px solid;text-transform:uppercase;
}
.nick-tag:nth-child(1){color:var(--neon-cyan);border-color:var(--neon-cyan);box-shadow:0 0 8px var(--neon-cyan),inset 0 0 8px rgba(0,245,255,0.1);}
.nick-tag:nth-child(2){color:var(--neon-pink);border-color:var(--neon-pink);box-shadow:0 0 8px var(--neon-pink),inset 0 0 8px rgba(255,45,120,0.1);}
.nick-tag:nth-child(3){color:var(--neon-yellow);border-color:var(--neon-yellow);box-shadow:0 0 8px var(--neon-yellow),inset 0 0 8px rgba(255,230,0,0.1);}

#message-box{
  font-family:'Space Mono',monospace;font-size:clamp(0.55rem,1.3vw,0.7rem);
  color:rgba(255,255,255,0.6);letter-spacing:0.04em;line-height:1.8;
  text-align:center;max-width:400px;margin-bottom:1.8rem;
  border-left:2px solid var(--neon-purple);padding-left:1rem;
}

#date-vhs{
  font-family:'VT323',monospace;font-size:1.3rem;
  color:var(--neon-purple);letter-spacing:0.2em;
  text-shadow:0 0 12px var(--neon-purple);
}

#hint-vhs{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  font-family:'VT323',monospace;font-size:0.9rem;
  color:rgba(255,255,255,0.25);letter-spacing:0.15em;
  white-space:nowrap;z-index:20;
  animation:blinkText 2s ease-in-out infinite;
}
@keyframes blinkText{0%,100%{opacity:0.25;}50%{opacity:0.55;}}</style>
</head>
<body>
<div id="custom-cursor" style="position:fixed;width:10px;height:10px;background:var(--neon-pink);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--neon-pink);mix-blend-mode:screen;"></div>
<div id="crt">
  <div id="screen">
    <canvas id="bg"></canvas>
    <div id="timestamp">30/04/2026 &nbsp; 00:00:00</div>
    <div id="rec">● REC</div>
    <div id="content">
      <!-- Play screen -->
      <div id="play-screen">
        <svg id="cassette-svg" width="160" height="96" viewBox="0 0 160 96">
          <rect x="4" y="4" width="152" height="88" rx="8" fill="#1a0028" stroke="#ff2d78" stroke-width="2"/>
          <rect x="18" y="14" width="124" height="52" rx="4" fill="#0a000f" stroke="#555" stroke-width="1"/>
          <circle id="reel-l" cx="50" cy="40" r="18" fill="none" stroke="#ff2d78" stroke-width="2"/>
          <circle cx="50" cy="40" r="8" fill="#ff2d78" opacity="0.4"/>
          <circle id="reel-r" cx="110" cy="40" r="18" fill="none" stroke="#00f5ff" stroke-width="2"/>
          <circle cx="110" cy="40" r="8" fill="#00f5ff" opacity="0.4"/>
          <rect x="60" y="75" width="40" height="12" rx="3" fill="#ffe600" opacity="0.8"/>
          <text x="80" y="85" text-anchor="middle" font-family="VT323" font-size="9" fill="#050008">MOONCHEERY</text>
          <rect x="32" y="22" width="96" height="3" rx="1" fill="#333"/>
          <path d="M 62 75 Q 80 68 98 75" fill="none" stroke="#444" stroke-width="2"/>
        </svg>
        <button id="play-btn" onclick="startShow()">▶ PRESS PLAY</button>
      </div>
      <!-- Main show -->
      <div id="main-screen">
        <div id="glitch-name" data-text="América Azyade">América Azyade</div>
        <div id="sub-text">Feliz Cumpleaños · 30 Abril 2026</div>
        <div id="nicks-row">
          <span class="nick-tag">Piojito</span>
          <span class="nick-tag">Pulga</span>
          <span class="nick-tag">MoonCherry</span>
        </div>
        <div id="message-box">
          Eres la canción favorita<br>
          que suena en loop en mi cabeza.<br>
          Hoy el universo te dedica<br>
          su mejor frecuencia. 📼
        </div>
        <div id="date-vhs">// 30 · IV · MMXXVI //</div>
      </div>
    </div>
    <div id="hint-vhs">[ toca la pantalla para efectos ]</div>
  </div>
</div>
<script>
const cursor=document.getElementById('custom-cursor');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});

// Timestamp clock
function updateClock(){
  const n=new Date();
  document.getElementById('timestamp').textContent=`30/04/2026   ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateClock,1000);updateClock();

// Cassette reel spin
let rAngle=0;
const reelL=document.getElementById('reel-l');
const reelR=document.getElementById('reel-r');
setInterval(()=>{
  rAngle+=3;
  reelL.setAttribute('transform',`rotate(${rAngle},50,40)`);
  reelR.setAttribute('transform',`rotate(${-rAngle},110,40)`);
},40);

// BG canvas
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){
  const s=document.getElementById('screen');
  W=canvas.width=s.offsetWidth;H=canvas.height=s.offsetHeight;
}
resize();

// Grid lines
let particles=[];
function initP(){
  particles=[];
  for(let i=0;i<60;i++){
    particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
      r:Math.random()*1.5+0.3,
      color:Math.random()<0.33?'#ff2d78':Math.random()<0.5?'#00f5ff':'#ffe600',
      alpha:Math.random()*0.5+0.2});
  }
}
initP();

// Click bursts
let bursts=[];
function addBurst(x,y){
  const colors=['#ff2d78','#00f5ff','#ffe600','#bf00ff','#ffffff'];
  for(let i=0;i<30;i++){
    const ang=Math.random()*Math.PI*2,spd=Math.random()*6+1;
    bursts.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,
      r:Math.random()*4+1,color:colors[Math.floor(Math.random()*colors.length)],
      life:Math.floor(Math.random()*35+20),maxLife:0,alpha:1});
    bursts[bursts.length-1].maxLife=bursts[bursts.length-1].life;
  }
}

// Glitch bars
let glitchBars=[];
let glitchTimer=0;

let t=0;
function draw(){
  t++;
  ctx.fillStyle='rgba(4,0,10,0.85)';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(255,45,120,0.06)';ctx.lineWidth=1;
  const spacing=40;
  for(let x=0;x<W;x+=spacing){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=spacing){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.globalAlpha=p.alpha*(0.5+0.5*Math.sin(t*0.03+p.x));
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Glitch bars
  glitchTimer++;
  if(glitchTimer>90&&Math.random()<0.04){
    glitchBars.push({y:Math.random()*H,h:Math.random()*8+2,life:Math.floor(Math.random()*8+3),maxLife:10,alpha:0.35});
    glitchTimer=0;
  }
  glitchBars=glitchBars.filter(b=>b.life>0);
  glitchBars.forEach(b=>{
    b.life--;
    ctx.globalAlpha=b.alpha*(b.life/b.maxLife);
    ctx.fillStyle=Math.random()<0.5?'#ff2d78':'#00f5ff';
    ctx.fillRect(0,b.y,W,b.h);
    // offset copy
    ctx.globalAlpha*=0.5;
    ctx.fillRect(Math.random()*20-10,b.y,W,b.h*0.5);
  });
  ctx.globalAlpha=1;

  // Bursts
  bursts=bursts.filter(b=>b.life>0);
  bursts.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;b.vy+=0.15;b.life--;
    const prog=b.life/b.maxLife;
    ctx.globalAlpha=prog;
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(b.x,b.y,Math.max(0,b.r*prog),0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;

  requestAnimationFrame(draw);
}
draw();

// Click effects on screen
document.getElementById('screen').addEventListener('click',e=>{
  const rect=document.getElementById('screen').getBoundingClientRect();
  addBurst(e.clientX-rect.left,e.clientY-rect.top);
});

function startShow(){
  const ps=document.getElementById('play-screen');
  const ms=document.getElementById('main-screen');
  ps.style.opacity='0';ps.style.pointerEvents='none';
  setTimeout(()=>{ms.style.opacity='1';ms.style.pointerEvents='auto';},600);
  for(let i=0;i<8;i++) setTimeout(()=>addBurst(Math.random()*W,Math.random()*H),i*120);
}
</script>
</body>
</html>
