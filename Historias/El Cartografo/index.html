<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Cartógrafo del Olvido · Kinosaby</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&family=Montserrat:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <canvas id="bg-canvas"></canvas>

  <!-- SVG gerbera defs -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <g id="g-pink">
        <g fill="#d45080">
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(0 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(30 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(60 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(90 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(120 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(150 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(180 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(210 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(240 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(270 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(300 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(330 50 50)" />
        </g>
        <circle cx="50" cy="50" r="13" fill="#1a0810" />
        <circle cx="50" cy="50" r="9" fill="#2a1018" />
      </g>
      <g id="g-red">
        <g fill="#d4504a">
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(0 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(30 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(60 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(90 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(120 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(150 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(180 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(210 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(240 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(270 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(300 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(330 50 50)" />
        </g>
        <circle cx="50" cy="50" r="13" fill="#1e0a08" />
        <circle cx="50" cy="50" r="9" fill="#2e1008" />
      </g>
      <g id="g-gold">
        <g fill="#e8b840">
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(0 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(30 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(60 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(90 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(120 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(150 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(180 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(210 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(240 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(270 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(300 50 50)" />
          <ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(330 50 50)" />
        </g>
        <circle cx="50" cy="50" r="13" fill="#1a1008" />
        <circle cx="50" cy="50" r="9" fill="#2a1c08" />
      </g>
    </defs>
  </svg>

  <div class="card">

    <div class="flowers">
      <svg class="hf1" width="40" height="40" viewBox="0 0 100 100">
        <use href="#g-pink" />
      </svg>
      <svg class="hf2" width="52" height="52" viewBox="0 0 100 100">
        <use href="#g-red" />
      </svg>
      <svg class="hf3" width="40" height="40" viewBox="0 0 100 100">
        <use href="#g-gold" />
      </svg>
    </div>

    <div class="eyebrow">✦ En proceso de creación ✦</div>
    <div class="main-title">Disponible<br>Pronto</div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="desc">
      Kinosaby está trabajando<br>
      en algo bonito para ti, Piojito.<br>
      Vuelve pronto. 🌸
    </div>

    <div class="progress-wrap">
      <div class="progress-label">Progreso</div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>

    <a href="../../" class="back-btn">← Volver al inicio</a>

    <div class="sig">Kinosaby</div>

  </div>

  <script src="script.js"></script>
</body>

</html>
