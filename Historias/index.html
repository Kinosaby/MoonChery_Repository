<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historias · Kinosaby</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #140810; --bg2: #1e0c18;
      --rose: #c43060; --rose-g: #e05080;
      --gold: #c8903a; --gold-l: #e8c878;
      --cream: #f5ece0; --muted: rgba(245, 236, 224, 0.5);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg1); color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow-x: hidden;
    }
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .portal {
      position: relative; z-index: 1; width: 90%; max-width: 800px;
      text-align: center; padding: 40px 20px;
    }
    .eyebrow {
      font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 5px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px; opacity: 0;
      animation: fadeUp 1s 0.2s forwards;
    }
    .title {
      font-family: 'Sacramento', cursive; font-size: clamp(48px, 10vw, 72px);
      margin-bottom: 40px; text-shadow: 0 0 30px rgba(196, 48, 96, 0.3);
      opacity: 0; animation: fadeUp 1s 0.4s forwards;
    }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px; perspective: 1000px;
    }
    .card {
      background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px; padding: 35px; text-decoration: none; color: inherit;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0; animation: fadeUp 1s 0.6s forwards;
      display: flex; flex-direction: column; align-items: center;
      backdrop-filter: blur(10px);
    }
    .card:hover {
      transform: translateY(-10px) scale(1.02);
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--rose); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }
    .card-icon { font-size: 44px; margin-bottom: 15px; }
    .card-title {
      font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 12px;
      color: var(--gold-l);
    }
    .card-desc {
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px;
      color: var(--muted); line-height: 1.5;
    }

    .back-btn {
      margin-top: 50px; display: inline-flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--muted); font-size: 11px; font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase; transition: color 0.3s;
      opacity: 0; animation: fadeUp 1s 0.8s forwards;
    }
    .back-btn:hover { color: var(--rose); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="portal">
    <div class="eyebrow">✦ Relatos e Historias ✦</div>
    <h1 class="title">Biblioteca de Sueños</h1>

    <div class="grid">
      <a href="El%20Ultimo%20Tren/" class="card">
        <div class="card-icon">🚂</div>
        <div class="card-title">El Último Tren</div>
        <div class="card-desc">Un viaje inesperado a través de los recuerdos y la estación del tiempo.</div>
      </a>
      <a href="El%20Cartografo/" class="card">
        <div class="card-icon">🗺️</div>
        <div class="card-title">El Cartógrafo</div>
        <div class="card-desc">Restaurando los mapas de los lugares que el olvido intentó borrar.</div>
      </a>
    </div>

    <a href="../" class="back-btn">← Volver al Portal Principal</a>
  </div>

  <script>
    const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
    let W, H, stars = [];
    function init() {
      W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight;
      stars = Array.from({length: 120}, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.5, a: Math.random(), sp: 0.001 + Math.random() * 0.003
      }));
    }
    function draw(t) {
      ctx.clearRect(0,0,W,H);
      stars.forEach(s => {
        const a = 0.2 + 0.8 * Math.abs(Math.sin(t * s.sp));
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(245, 236, 224, ${s.a * a})`; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    init(); requestAnimationFrame(draw);
    window.addEventListener('resize', init);
  </script>
</body>
</html>
